<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Executor Links - Red Matrix</title>
    <style>
        /* Grundlegender Matrix-Hintergrund */
        body {
            background-color: #000000;
            color: #FF0000; /* Leuchtendes Rot für den Text */
            font-family: 'Consolas', 'Courier New', monospace; /* Konsolen-Schriftart */
            padding: 20px;
            margin: 0;
            text-shadow: 0 0 5px #8B0000; /* Leichter roter Schein */
        }

        /* Hauptüberschrift */
        h1 {
            color: #FF4500; /* Orange-Rot für die Überschrift */
            text-align: center;
            border-bottom: 2px solid #8B0000;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        /* Container für die Links */
        .link-container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #440000;
            padding: 20px;
            background-color: #0A0000; /* Sehr dunkles Rot/Schwarz */
        }

        /* Style für jeden Link-Eintrag */
        .executor-entry {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #330000;
        }

        .executor-entry:last-child {
            border-bottom: none;
        }

        /* Executor-Name */
        .name {
            font-weight: bold;
            color: #FF6347; /* Tomatenrot für Namen */
            flex-basis: 30%;
        }

        /* Link-URL */
        .url {
            color: #FFD700; /* Gold-Ton für die URL-Hervorhebung */
            text-decoration: none;
            flex-basis: 70%;
            text-align: right;
        }
        
        /* Hover-Effekt für Links */
        .url:hover {
            color: #FFFFFF; /* Weiß bei Hover */
            text-shadow: 0 0 10px #FF0000;
        }
        
        /* Fußzeile/Hinweis */
        .footer-note {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8em;
            color: #8B0000;
        }
    </style>
</head>
<body>

    <h1>[ ROBLOX EXECUTOR DIRECTORY ]</h1>

    <div class="link-container">
        
        <div class="executor-entry">
            <span class="name">DELTA</span>
            <a href="https://deltaexploits.gg" class="url" target="_blank">deltaexploits.gg</a>
        </div>
        
        <div class="executor-entry">
            <span class="name">CODEX</span>
            <a href="https://codex.lol" class="url" target="_blank">codex.lol</a>
        </div>
        
        <div class="executor-entry">
            <span class="name">EVON</span>
            <a href="https://evon.cc" class="url" target="_blank">evon.cc</a>
        </div>
        
        <div class="executor-entry">
            <span class="name">VEGAX</span>
            <a href="https://vegax.gg" class="url" target="_blank">vegax.gg</a>
        </div>
        
        <div class="executor-entry">
            <span class="name">XENO</span>
            <a href="https://xeno.onl" class="url" target="_blank">xeno.onl</a>
        </div>
        
        <div class="executor-entry">
            <span class="name">VALEX</span>
            <a href="https://valex.io" class="url" target="_blank">valex.io</a>
        </div>

    </div>
    
    <div class="footer-note">
        // ACCESS LEVEL: RED-MATRIX-PROTOCOL // DATA INTEGRITY: VERIFIED
    </div>

</body>
</html>
